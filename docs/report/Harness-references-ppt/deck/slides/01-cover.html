<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>01 · Cover</title>
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .cover {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .cover .eyebrow {
    color: var(--ink-soft);
    margin-bottom: 36px;
  }
  .cover .eyebrow::before { background: var(--ink-soft); }

  .cover .title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 144px;
    line-height: 1.02;
    letter-spacing: -0.04em;
    color: var(--ink);
    margin-bottom: 56px;
    max-width: 1700px;
  }
  .cover .title .from-to {
    font-weight: 300;
    font-size: 88px;
    color: var(--muted);
    letter-spacing: -0.02em;
    margin-right: 24px;
    vertical-align: 12px;
  }
  .cover .title .row + .row { margin-top: 6px; }

  .cover .subtitle {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 400;
    line-height: 1.45;
    color: var(--ink-soft);
    max-width: 1100px;
    margin-bottom: 80px;
    padding-left: 26px;
    border-left: 3px solid var(--border-strong);
  }

  .cover .meta {
    font-family: var(--font-mono);
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.9;
  }
  .cover .meta .name {
    color: var(--ink);
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .cover .meta .sep {
    color: var(--dim);
    margin: 0 12px;
  }
</style>
</head>
<body>
<div class="slide">
  <header class="chrome-top">
    <span class="brand-bar">
      <span class="brand-dot"></span>
      <span class="mono"><span class="chrome-section">BITFUN</span> <span class="dim">/</span> talks</span>
    </span>
    <span class="mono"><span class="chrome-page">01</span> <span class="dim">/</span> 19</span>
  </header>

  <div class="cover">
    <div class="eyebrow">Reliable AI Coding · 松鼠会</div>

    <div class="title">
      <div class="row"><span class="from-to">从</span>Vibe Coding</div>
      <div class="row"><span class="from-to">到</span>Harness Engineering</div>
    </div>

    <p class="subtitle">
      Coding Agent 的上限由模型决定，<br>
      下限由 Harness 决定。
    </p>

    <div class="meta">
      <span class="name">李文博 · l00566851</span>
      <span class="sep">/</span>
      2012, IDE Lab
      <span class="sep">·</span>
      April 2026
    </div>
  </div>

  <footer class="chrome-bottom">
    <span class="mono"><span class="dim">harness-engineering</span></span>
    <span class="mono"><span class="dim">v3.1</span></span>
  </footer>
</div>
</body>
</html>
