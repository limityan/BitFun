    <text x="692" y="834" class="label5" style="font-size:27px">灵活变更</text>
    <text x="692" y="868" class="small5" style="font-size:21px">低成本试错</text>
  
    
    <rect x="974" y="818" width="360" height="90" rx="14" fill="#FFFFFF" stroke="#C4C6C1" stroke-width="2" filter="url(#paperShadow)"/>
    <g transform="translate(1004 839) scale(0.75)"><circle cx="32" cy="22" r="8" stroke="#FF5A1F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="18" cy="30" r="6" stroke="#FF5A1F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="46" cy="30" r="6" stroke="#FF5A1F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M14 50 q18 -16 36 0 M4 54 q14 -12 28 -5 M32 49 q14 -7 28 5" stroke="#FF5A1F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
    
    <text x="1082" y="834" class="label5" style="font-size:27px">少量配合</text>
    <text x="1082" y="868" class="small5" style="font-size:21px">个人可先探索</text>
  
    
