    <text x="42" y="46" class="brand5">BitFun</text>
    <text x="1840" y="50" class="small5" text-anchor="end">05 / 11</text>
  
  
    
    <text x="96" y="132" class="small5" style="fill:#106BEF;font-weight:900">02 / 探索方式</text>
    <text x="96" y="188" class="h15" style="font-size:70px">AI 先改变探索方式</text>
    <text x="100" y="282" class="sub5">探索可以想法驱动，但交付必须证据驱动。</text>
    <path d="M96 356 h112" stroke="#106BEF" stroke-width="8" stroke-linecap="round"/>
    <circle cx="230" cy="356" r="5.5" fill="#FF5A1F"/>
  
    <rect x="146" y="410" width="720" height="386" rx="18" fill="#FFFFFF" stroke="#C4C6C1" stroke-width="2" filter="url(#paperShadow)"/>
    <rect x="1054" y="410" width="720" height="386" rx="18" fill="#FFFFFF" stroke="#C4C6C1" stroke-width="2" filter="url(#paperShadow)"/>
    <text x="210" y="474" class="small5" style="fill:#A5A9AE;font-weight:900">过去常见节奏</text>
    <text x="210" y="548" class="num5" style="font-size:54px">排期驱动</text>
    <text x="210" y="612" class="muted5">想法进入 backlog，等待排人、评估、实现和验收。</text>
    <path d="M240 686 H760" stroke="#C4C6C1" stroke-width="4"/>
    <text x="210" y="744" class="small5">适合稳定需求，但不适合高频探索。</text>
    <text x="1118" y="474" class="small5" style="fill:#106BEF;font-weight:900">AI 介入之后</text>
    <text x="1118" y="548" class="num5" style="font-size:54px;fill:#106BEF">想法驱动</text>
    <text x="1118" y="612" class="muted5">一个人和 Agent 可以快速做出可运行版本。</text>
    <path d="M1148 686 H1668" stroke="#106BEF" stroke-width="4"/>
    <text x="1118" y="744" class="small5">适合原型验证，但必须回到证据。</text>
    <path d="M902 626 H1012" stroke="#106BEF" stroke-width="6" fill="none" marker-end="url(#arrowBlue)"/>
    
    <rect x="194" y="818" width="360" height="90" rx="14" fill="#FFFFFF" stroke="#C4C6C1" stroke-width="2" filter="url(#paperShadow)"/>
